<!doctype html>
<html>
  <head>
    <title>Mood Learning System</title>
    

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background-color: #f4f4f4;
        transition: 0.5s;
      }

      .container {
        width: 80%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-top: 30px;
      }

      video {
        border-radius: 10px;
        margin-top: 10px;
      }

      .mood-box {
        margin-top: 20px;
        padding: 10px;
        font-size: 20px;
        font-weight: bold;
      }

      .content {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: #eee;
      }

      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }

      button:hover {
        background: #0056b3;
      }

      .link-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 15px;
        background: green;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }

      .link-btn:hover {
        background: darkgreen;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Mood-Based Learning System</h1>

      <button onclick="startCamera()">Aktifkan Kamera</button>
      <br /><br />

      <video id="video" width="300" autoplay></video>

      <div class="mood-box" id="moodText">
        Mood: -
      </div>

      <div class="content" id="contentArea">
        Materi akan muncul di sini
      </div>
    </div>

    <script>
      let currentMood = "-";
      let intervalId = null;
      // Aktifkan kamera
      function startCamera() {
        navigator.mediaDevices
          .getUserMedia({ video: true })
          .then((stream) => {
            document.getElementById("video").srcObject = stream;

            intervalId = setInterval(detectMood, 3000);
          })
          .catch(() => alert("Kamera tidak bisa diakses"));
      }
      // Dummy deteksi mood
      function detectMood() {
        const moods = ["happy", "sad", "tired"];

        currentMood =
          moods[Math.floor(Math.random() * moods.length)];

        document.getElementById("moodText").innerText =
          "Mood: " + currentMood;

        changeUI(currentMood);
        showContent(currentMood);
      }

      // Ganti warna background
      function changeUI(mood) {
        if (mood === "happy") {
          document.body.style.backgroundColor = "#d4edda";
        }

        else if (mood === "sad") {
          document.body.style.backgroundColor = "#f8d7da";
        }

        else if (mood === "tired") {
          document.body.style.backgroundColor = "#fff3cd";
        }
      }

      // Tampilkan materi + tombol website
      function showContent(mood) {
        const content =
          document.getElementById("contentArea");

        if (mood === "happy") {
          content.innerHTML = `
            <h3>Materi Lengkap + Soal Sulit</h3>
            <p>Kamu terlihat semangat belajar!</p>

            <a href="https://moodlee-learning.moodiy.com/course/section.php?id=12"
               target="_blank"
               class="link-btn">
              Exceptions dan Assertions File
            </a>
          `;
        }

        else if (mood === "sad") {
          content.innerHTML = `
            <h3>Ringkasan Materi Singkat</h3>
            <p>Materi ringan agar tidak terlalu lelah.</p>

            <a href="https://moodlee-learning.moodiy.com/course/section.php?id=9"
               target="_blank"
               class="link-btn">
               Baca Ringkasan Materi
            </a>
          `;
        }
        else if (mood === "tired") {
          content.innerHTML = `
             <h3>Video Pendek + Penjelasan Ringan</h3>
             <p>Belajar santai dulu ya 😊</p>

            <a href="https://moodlee-learning.moodiy.com/course/section.php?id=6"
               target="_blank"
               class="link-btn">
               Tonton Vidio Belajar
            </a>
          `;
        }
      }
    </script>
  </body>
</html>
